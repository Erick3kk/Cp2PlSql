<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Awareness 2026 | Cashback</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="card">
        <span class="badge">Fidelidade & Bônus</span>
        
        <h1>Eco-Awareness 2026</h1>
        <p>Programa de Cashback Progressivo para ativistas.</p>
        
        <div class="input-group">
            <label for="eventoId">ID DO EVENTO FINALIZADO</label>
            <input type="number" id="eventoId" placeholder="Ex: 3" value="1">
        </div>

        <button id="btnDistribuir" onclick="distribuir()">
            Distribuir Créditos de Cashback
        </button>

        <div class="status-container">
            <h3>Saldos Atuais dos Participantes</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Participante</th>
                        <th style="text-align: right;">Saldo</th>
                    </tr>
                </thead>
                <tbody id="tabela-usuarios">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        function carregarUsuarios() {
            fetch('/usuarios')
                .then(res => res.json())
                .then(data => {
                    const corpoTabela = document.getElementById('tabela-usuarios');
                    corpoTabela.innerHTML = ''; 
                    
                    data.forEach(u => {
                        corpoTabela.innerHTML += `
                            <tr>
                                <td class="td-id">#${u.id}</td>
                                <td class="td-nome">${u.nome}</td>
                                <td class="td-saldo">R$ ${u.saldo}</td>
                            </tr>
                        `;
                    });
                })
                .catch(err => console.error("Erro ao carregar usuários:", err));
        }

        function distribuir() {
            const btn = document.getElementById('btnDistribuir');
            const eventoId = document.getElementById('eventoId').value;

            btn.innerText = "Processando...";
            btn.style.opacity = "0.7";
            btn.disabled = true;

            fetch('/distribuir', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id_evento: eventoId })
            })
            .then(response => response.json())
            .then(data => {
                alert(data.message);
                carregarUsuarios(); 
            })
            .catch(error => {
                alert("Erro na operação de banco de dados.");
                console.error(error);
            })
            .finally(() => {
                btn.innerText = "Distribuir Créditos de Cashback";
                btn.style.opacity = "1";
                btn.disabled = false;
            });
        }

        window.onload = carregarUsuarios;
    </script>
</body>
</html>
